workflow:
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

default:
  tags:
    - thelab-arm64

stages:
  - test
  - release

variables:
  NODE_ENV: development
  PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  # We have to disable sigstore for now since NPM currently only supports
  # provenance when publishing from a gitlab-hosted runner. Hopefully we can
  # enable this in the future once they drop this limitation (which should be
  # possible since PyPI has no such limitation on their use of sigstore).
  NPM_CONFIG_PROVENANCE: "false"

.dev_dependency_job: &dev_dependency_job
  image: node:24@sha256:df0c595f03d86c4ee091334106c80620b415e8fc5d65b320f7cea1d5ce2f690c
  before_script:
    - npm ci
  cache:
    key: devdependencies
    paths:
      - node_modules

include:
  - component: gitlab.com/thelabnyc/thelab-ci-components/review@0.8.4
  - component: gitlab.com/thelabnyc/thelab-ci-components/precommit@0.8.4
  - component: gitlab.com/thelabnyc/thelab-ci-components/publish-gitlab-release@0.8.4
  - component: gitlab.com/thelabnyc/thelab-ci-components/publish-to-npm@0.8.4

test:
  <<: *dev_dependency_job
  stage: test
  needs: []
  script:
    - npm run check
    - npm run build
    - npm run test
